name: PR conflict label

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
jobs:
  conflicts:
    runs-on: ubuntu-latest
    steps:
      - name: Check conflicts
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            async function checkPR(pr) {
              let data;
              let retries = 5;
              const issue_number = pr.number;

              while (retries > 0) {
                const response = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: issue_number
                });
                data = response.data;
                console.log(`PR #${issue_number} state: ${data.mergeable_state}`);
                if (data.mergeable_state !== 'unknown') break;
                
                await new Promise(r => setTimeout(r, 3000));
                retries--;
              }

              if (data.mergeable_state === 'dirty') {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: ['Conflictos']
                });
              } else {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number,
                    name: 'Conflictos'
                  });
                } catch (e) {
                  // label no existía
                }
              }
            }

            if (context.eventName === 'pull_request') {
              await checkPR(context.payload.pull_request);
            }

            if (context.eventName === 'push') {
              // Buscar PRs abiertos contra master
              const { data: prs } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                base: 'main'
              });

              for (const pr of prs) {
                await checkPR(pr);
              }
            }
